# ============================================================
#  tmux_config / tmux.conf
#  通过 ~/.tmux.conf 软链加载(见 setup.sh)。目标:像 zellij 一样开箱顺手。
#  需要 tmux >= 3.5(滚动条) + 终端使用含 Nerd Font 图标的等宽字体。
# ============================================================

#--- 基础体验 ------------------------------------------------
set  -g  mouse on                      # 鼠标:选 pane / 调大小 / 滚动
set  -g  history-limit 50000           # 更大的回滚缓冲
set  -sg escape-time 10                # 去掉 ESC 延迟(vim 友好)
set  -g  focus-events on               # 让 pane 内程序感知聚焦变化
set  -g  base-index 1                  # 窗口从 1 开始编号
setw -g  pane-base-index 1             # pane 也从 1 开始
set  -g  renumber-windows on           # 关掉窗口后重新编号
set  -g  set-clipboard on              # 复制写入系统剪贴板(OSC52)

#--- 真彩色 --------------------------------------------------
set  -g  default-terminal "tmux-256color"
set  -ga terminal-features ",*:RGB"

#--- 复制模式用 vi 键位 --------------------------------------
setw -g  mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

#--- 顺手的快捷键 --------------------------------------------
bind | split-window -h -c "#{pane_current_path}"   # 竖直分屏(当前目录)
bind - split-window -v -c "#{pane_current_path}"   # 水平分屏(当前目录)
bind c new-window     -c "#{pane_current_path}"     # 新窗口(当前目录)
bind h select-pane -L                               # hjkl 切 pane
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display "已重载 tmux 配置"   # prefix+r 重载
# (可选)把 prefix 从 C-b 换成更顺手的 C-a —— 想要就取消下面两行注释:
# unbind C-b
# set -g prefix C-a

#--- 免 prefix:Alt+hjkl / Alt+方向 直接切 pane(照搬 zellij)-
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R
bind -n M-n split-window -h -c "#{pane_current_path}"   # Alt+n 新建 pane

#--- zellij 式模式:进入后单键连续操作,Esc/Enter/q 退出 ------
#   prefix p → PANE 模式   prefix t → TAB 模式(= zellij 的 tab)
#   进入后顶部状态栏会显示当前模式名(见状态栏一节)
bind p switch-client -T PANE
bind t switch-client -T TAB

# PANE 模式:移动键"粘"在模式里(可连续移动);动作键做完即自动退出回 root
bind -T PANE h { select-pane -L ; switch-client -T PANE }
bind -T PANE j { select-pane -D ; switch-client -T PANE }
bind -T PANE k { select-pane -U ; switch-client -T PANE }
bind -T PANE l { select-pane -R ; switch-client -T PANE }
bind -T PANE n split-window -h -c "#{pane_current_path}"   # 新建后即退出
bind -T PANE s split-window -v -c "#{pane_current_path}"   # 新建后即退出
bind -T PANE x kill-pane                                    # 关闭后即退出
bind -T PANE z resize-pane -Z                               # 放大/还原后即退出
bind -T PANE Escape switch-client -T root
bind -T PANE Enter  switch-client -T root
bind -T PANE q      switch-client -T root

# TAB 模式:切换键"粘"在模式里(可连续切);动作键做完即自动退出回 root
bind -T TAB h { previous-window ; switch-client -T TAB }
bind -T TAB l { next-window ; switch-client -T TAB }
bind -T TAB n new-window -c "#{pane_current_path}"          # 新建后即退出
bind -T TAB x kill-window                                    # 关闭后即退出
bind -T TAB r command-prompt -I "#W" { rename-window "%%" }  # 改名(本就退出)
bind -T TAB Escape switch-client -T root
bind -T TAB Enter  switch-client -T root
bind -T TAB q      switch-client -T root

#--- 滚动条(3.6):仅滚动时显示,平时不占视觉 ----------------
setw -g pane-scrollbars modal
setw -g pane-scrollbars-position right
setw -g pane-scrollbars-style "bg=#313244,fg=#6c7086,width=1,pad=0"   # Mocha

#--- 聚焦提示 -----------------------------------------------
# 不压暗非聚焦 pane(保留终端原生底色,否则会出现不匹配的丑底色)。
# pane 边框颜色交给 catppuccin 统一管理(Mocha:聚焦=薰衣草,非聚焦=灰)。
setw -g window-style        default
setw -g window-active-style default

#--- 状态栏:catppuccin / Mocha 主题 ------------------------
# 外观交给 catppuccin 插件;status-left/right 的最终组装放在文件末尾
#(插件加载之后)进行 —— 这是 catppuccin v2 的硬性要求。
set -g status on
set -g status-interval 5
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"     # 圆角药丸 tab
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"                  # 非当前 tab:窗口名
set -g @catppuccin_window_current_text " #W"           # 当前 tab

#--- 插件:TPM + catppuccin + which-key ---------------------
# which-key 会引用 TMUX_PLUGIN_MANAGER_PATH;显式置为真实路径(可移植,消除启动告警)
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'              # 漂亮的状态栏主题(Mocha)
set -g @plugin 'alexwforsythe/tmux-which-key'        # prefix + Space 弹出动作菜单
run '~/.tmux/plugins/tpm/tpm'          # 加载全部插件

#--- 状态栏组装(必须在 catppuccin 加载之后)----------------
set -g status-position top                            # tab 栏放到顶部(像 zellij)
set -g status-left-length 100
set -g status-right-length 200
# 左侧:平时空;进入 PANE/TAB 模式时显示模式名(mocha 黄底)
set -g status-left "#{?#{!=:#{client_key_table},root},#[fg=#1e1e2e#,bg=#f9e2af#,bold] #{client_key_table} #[default] ,}"
# 右侧:在 PANE/TAB 模式中实时列出该模式可用键(像 zellij 底栏);
#        平时回落到 catppuccin 的 session + 日期时间模块。
set -g status-right "#{?#{==:#{client_key_table},PANE},#[fg=#cdd6f4]hjkl#[fg=#6c7086] 移动  #[fg=#cdd6f4]n#[fg=#6c7086] 左右开  #[fg=#cdd6f4]s#[fg=#6c7086] 上下开  #[fg=#cdd6f4]x#[fg=#6c7086] 关闭  #[fg=#cdd6f4]z#[fg=#6c7086] 放大  #[fg=#cdd6f4]Esc#[fg=#6c7086] 退出 ,#{?#{==:#{client_key_table},TAB},#[fg=#cdd6f4]h/l#[fg=#6c7086] 切换  #[fg=#cdd6f4]n#[fg=#6c7086] 新建  #[fg=#cdd6f4]x#[fg=#6c7086] 关闭  #[fg=#cdd6f4]r#[fg=#6c7086] 改名  #[fg=#cdd6f4]Esc#[fg=#6c7086] 退出 ,#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}}}"

# 命令行 / 复制模式选中高亮:统一到 Mocha 表面色
set -g  message-style "bg=#313244,fg=#cdd6f4"
setw -g mode-style    "bg=#45475a,fg=#cdd6f4"

# 弹窗(which-key 菜单 / display-popup 等)圆角边框 + Mocha 薰衣草描边
set -g popup-border-lines rounded
set -g popup-border-style "fg=#cba6f7"
